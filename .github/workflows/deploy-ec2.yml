name: Deploy to EC2

on:
  workflow_dispatch:

concurrency:
  group: deploy-ec2
  cancel-in-progress: false

env:
  RELEASE_NAME: blessing-tree-${{ github.sha }}.tar.gz
  EC2_PORT: ${{ vars.EC2_PORT || '22' }}
  EC2_DEPLOY_PATH: ${{ vars.EC2_DEPLOY_PATH || '/opt/blessing-tree' }}
  EC2_API_SERVICE: ${{ vars.EC2_API_SERVICE || 'blessing-tree-api' }}
  EC2_CELERY_SERVICE: ${{ vars.EC2_CELERY_SERVICE || 'blessing-tree-celery' }}
  EC2_CELERY_BEAT_SERVICE: ${{ vars.EC2_CELERY_BEAT_SERVICE || 'blessing-tree-celerybeat' }}
  BT_KEEP_RELEASES: ${{ vars.BT_KEEP_RELEASES || '5' }}
  BT_RUN_MIGRATIONS: ${{ vars.BT_RUN_MIGRATIONS || 'false' }}
  BT_MIGRATION_COMMAND: ${{ vars.BT_MIGRATION_COMMAND || '' }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: blessing-tree-ui/package-lock.json

      - name: Build frontend
        working-directory: blessing-tree-ui
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || secrets.VITE_API_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: blessing-tree-api/requirements.txt

      - name: Validate backend dependencies
        working-directory: blessing-tree-api
        run: python -m pip install -r requirements.txt

      - name: Package release
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release/blessing-tree-api release/blessing-tree-ui release/scripts/deploy

          rsync -a \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            blessing-tree-api/app \
            blessing-tree-api/db \
            blessing-tree-api/requirements.txt \
            blessing-tree-api/version.json \
            release/blessing-tree-api/

          rsync -a blessing-tree-ui/dist release/blessing-tree-ui/
          rsync -a scripts/deploy/ec2_deploy_release.sh release/scripts/deploy/

          tar -czf "$RELEASE_NAME" -C release .

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -p "$EC2_PORT" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_deploy_key -p "$EC2_PORT" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "mkdir -p /tmp/blessing-tree-deploy"
          scp -i ~/.ssh/ec2_deploy_key -P "$EC2_PORT" "$RELEASE_NAME" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/blessing-tree-deploy/$RELEASE_NAME"
          scp -i ~/.ssh/ec2_deploy_key -P "$EC2_PORT" scripts/deploy/ec2_deploy_release.sh \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/blessing-tree-deploy/ec2_deploy_release.sh"

      - name: Activate release
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/ec2_deploy_key -p "$EC2_PORT" "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "chmod +x /tmp/blessing-tree-deploy/ec2_deploy_release.sh && \
             BT_APP_DIR='$EC2_DEPLOY_PATH' \
             BT_API_SERVICE='$EC2_API_SERVICE' \
             BT_CELERY_SERVICE='$EC2_CELERY_SERVICE' \
             BT_CELERY_BEAT_SERVICE='$EC2_CELERY_BEAT_SERVICE' \
             BT_KEEP_RELEASES='$BT_KEEP_RELEASES' \
             BT_RUN_MIGRATIONS='$BT_RUN_MIGRATIONS' \
             BT_MIGRATION_COMMAND='$BT_MIGRATION_COMMAND' \
             /tmp/blessing-tree-deploy/ec2_deploy_release.sh \
               '/tmp/blessing-tree-deploy/$RELEASE_NAME' \
               '$EC2_DEPLOY_PATH'"
